windowrule {
  name = windowrule-opacity
  opacity = 1 override
  match:fullscreen = 0
}
windowrule {
  name = windowrule-disable-opacity
  opaque = on
  match:class = equibop|org\.quickshell|imv|swappy  # They use native transparency or we want them opaque
}
windowrule {
  name = windowrule-float
  center = 1
  match:float = 1
  match:xwayland = 0  # Center all floating windows (not xwayland cause popups)
}

windowrule {
  name = guifetch
  float = on
  match:class = guifetch  # FlafyDev/guifetch
}
windowrule {
  name = yad
  float = on
  match:class = yad
}
windowrule {
  name = zenity
  float = on
  match:class = zenity
}
windowrule {
  name = wev
  float = on
  match:class = wev
}
windowrule {
  name = file-roller
  float = on
  match:class = org\.gnome\.FileRoller
}
windowrule {
  name = file-roller-2
  float = on
  match:class = file-roller  # WHY IS THERE TWOOOOOOOOOOOOOOOO
}
windowrule {
  name = blueman
  float = on
  match:class = blueman-manager
}
windowrule {
  name = gradience
  float = on
  match:class = com\.github\.GradienceTeam\.Gradience
}
windowrule {
  name = feh
  float = on
  match:class = feh
}
windowrule {
  name = imv
  float = on
  match:class = imv
}
windowrule {
  name = printer
  float = on
  match:class = system-config-printer
}
windowrule {
  name = quickshell
  float = on
  match:class = org\.quickshell
}

windowrule {
  name = flatseal
  float = on
  size = (monitor_w*0.7) (monitor_h*0.8)
  center = 1
  match:class = com\.github\.tchx84\.Flatseal
}

# Special workspaces
windowrule {
  name = workspace-system-monitor
  workspace = special:sysmon
  match:class = btop
}
windowrule {
  name = workspace-music
  workspace = special:music
  match:class = feishin|Spotify|Supersonic|Cider|spotify
}
windowrule {
  name = workspace-music-2
  workspace = special:music
  # it has no class for some reason
  match:initial_title = Spotify( Free)?  # Spotify wayland
}
windowrule {
  name = special-communication
  workspace = special:communication
  match:class = discord|equibop|vesktop|whatsapp|org\.telegram\.desktop|Slack
}
windowrule {
  name = special-todo
  workspace = special:todo
  match:class = Todoist
}

# Dialogs
windowrule {
  name = select-dialog
  float = on
  match:title = (Select|Open)( a)? (File|Folder)(s)?
}
windowrule {
  name = upload-dialog
  float = on
  match:title = File (Operation|Upload)( Progress)?
}
windowrule {
  name = properties-dialog
  float = on
  match:title = .* Properties
}
windowrule {
  name = library-dialog
  float = on
  match:title = Library
}
windowrule {
  name = save-as-dialog
  float = on
  match:title = Save As
}
windowrule {
  name = rename-dialog
  float = on
  match:title = Rename .*
}
windowrule {
  name = export-dialog
  float = on
  match:title = Export *
}

# Wine
windowrule {
  name = wine-winecfg
  float = on
  match:class = winecfg.exe
}

windowrule {
    name = wine-file-dialogs
    match:class = .*\.exe
    match:title = ^(Open|Save As|Select a theme file|Choose File)$

    float = on
    center = on
    suppress_event = maximize fullscreen
}

windowrule {
    name = mp3tag-popups
    match:class = ^Mp3tag\.exe$
    match:title = ^(Options|Tags|Progress|Extended Tags)$

    float = on
    center = on
}

windowrule {
  name = picture-in-picture-window
  move = ((monitor_w*1)-window_w-(monitor_w*0.02)) ((monitor_h*1)-window_h-(monitor_h*0.03))
  keep_aspect_ratio = on
  float = on
  pin = on
  match:title = Picture(-| )in(-| )[Pp]icture
}

windowrule {
  name = steam-main
  rounding = 10
  match:class = steam
}
windowrule {
  name = steam-friends
  float = on
  match:title = Friends List
  match:class = steam
}
windowrule {
  name = steam-games
  immediate = on  # Allow tearing for steam games
  idle_inhibit = always # Always idle inhibit when playing a steam game
  match:class = steam_app_[0-9]+
}

windowrule {
  name = jetbrains-phpstorm-search-everywhere
  size = 685 800
  center = on
  match:class = ^(jetbrains-phpstorm)$
  match:float = 1
}

windowrule {
  name = mullvad-vpn
  pin = on
  move = 63 ((monitor_h*1)-window_h-(monitor_h*0.03))
  match:class=Mullvad VPN
  match:float = 1
}

windowrule {
  name = at-launcher
  float = on
  match:class = com-atlauncher-App
  match:title = ATLauncher Console
}

windowrule {
  name = prism-launcher
  float = on
  size = (monitor_w*0.7) (monitor_h*0.8)
  center = 1
  match:class = org.prismlauncher.PrismLauncher
}

windowrule {
  name = settings
  float = on
  size = (monitor_w*0.7) (monitor_h*0.8)
  center = 1
  match:class = org\.gnome\.Settings
}

windowrule {
  name = pavu-control
  float = on
  size = (monitor_w*0.6) (monitor_h*0.7)
  center = 1
  match:class = org\.pulseaudio\.pavucontrol|yad-icon-browser
}

windowrule {
  name = nvg
  float = on
  size = (monitor_w*0.5) (monitor_h*0.6)
  center = 1
  match:class = nwg-look
}

windowrule {
  name = nmtui
  float = on
  size = (monitor_w*0.6) (monitor_h*0.7)
  center = 1
  match:class = com\.mitchellh\.ghostty
  match:title = nmtui
}

windowrule {
  name = xwayland-popups
  no_dim = on
  no_shadow = on
  rounding = 10
  match:xwayland = 1
  match:title = win[0-9]+
}

windowrule {
  name = edge
  match:class = microsoft-edge
  suppress_event = maximize fullscreen
}

windowrule {
  name = vivaldi-settings
  match:title = Vivaldi Settings.*
  float = on
  center = 1
}

# ######## Workspace rules ########
workspace = w[tv1]s[false], gapsout:0 0 0 10
workspace = f[1]s[false], gapsout:0 0 0 10

# ######## Layer rules ########
layerrule {
  name = layerrule-1
  animation = fade
  match:namespace = hyprpicker  # Colour picker out animation
}
layerrule {
  name = layerrule-2
  animation = fade
  match:namespace = logout_dialog  # wlogout
}
layerrule {
  name = layerrule-3
  animation = fade
  match:namespace = selection  # slurp
}
layerrule {
  name = layerrule-4
  animation = fade
  match:namespace = wayfreeze
}

# Fuzzel
layerrule {
  name = layerrule-5
  animation = popin 80%
  blur = on
  match:namespace = launcher
}

# Shell
layerrule {
  name = layerrule-6
  no_anim = on
  match:namespace = caelestia-(border-exclusion|area-picker)
}
layerrule {
  name = layerrule-7
  animation = fade
  match:namespace = caelestia-(drawers|background)
}
layerrule {
  name = layerrule-8
  blur = on
  ignore_alpha = 0.57
  match:namespace = caelestia-drawers
}

