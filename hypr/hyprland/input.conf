input {
    kb_layout = us,ru
    kb_options = grp:caps_toggle
    numlock_by_default = false
    repeat_delay = 250
    repeat_rate = 50

    focus_on_close = 1

    accel_profile = flat
    sensitivity = 0.9

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        scroll_factor = 0.3
    }
}

binds {
    scroll_event_delay = 0
}

cursor {
    hotspot_padding = 1
}

