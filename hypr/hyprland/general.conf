general {
    layout = dwindle

    allow_tearing = false  # Allows `immediate` window rule to work

    gaps_workspaces = 5
    gaps_in = 2
    gaps_out = 5
    border_size = 3

    col.active_border = rgba($primarye6)
    col.inactive_border = rgba($onSurfaceVariant11)
}

dwindle {
	preserve_split = true
	smart_split = false
	smart_resizing = true
}
